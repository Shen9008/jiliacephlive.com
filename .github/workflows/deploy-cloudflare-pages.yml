# Deploys static files to the existing Cloudflare Pages project "jiliacephlive".
#
# Repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — Custom API token with Account → Cloudflare Pages → Edit
#   CLOUDFLARE_ACCOUNT_ID  — Dashboard right sidebar (Account ID) or Workers & Pages overview

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-jiliacephlive
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static output
        run: |
          mkdir -p _site
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_site' \
            ./ _site/

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name=jiliacephlive --branch=${{ github.ref_name }} --commit-hash=${{ github.sha }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Deployment URL
        run: echo "${{ steps.deploy.outputs.deployment-url }}"
